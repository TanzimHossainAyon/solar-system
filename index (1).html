<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solar System Simulator</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;900&family=Exo+2:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>
<canvas id="space"></canvas>

<!-- TOP BAR -->
<header class="top-bar">
  <div class="logo">☀️ <span>SOLAR</span>SYSTEM</div>
  <div class="controls">
    <button class="ctrl-btn" id="pause-btn" onclick="togglePause()">⏸ Pause</button>
    <div class="speed-wrap">
      <span class="ctrl-label">Speed</span>
      <input type="range" id="speed" min="0.1" max="5" step="0.1" value="1" oninput="setSpeed(this.value)">
      <span id="speed-val">1x</span>
    </div>
    <button class="ctrl-btn" onclick="resetView()">🔄 Reset</button>
  </div>
</header>

<!-- PLANET INFO PANEL -->
<div id="info-panel" class="info-panel hidden">
  <button class="close-btn" onclick="closePanel()">✕</button>
  <div class="planet-icon" id="p-icon">🪐</div>
  <h2 id="p-name">Planet</h2>
  <div class="p-stats">
    <div class="p-stat"><span class="p-stat-label">Type</span><span id="p-type" class="p-stat-val">—</span></div>
    <div class="p-stat"><span class="p-stat-label">Distance from Sun</span><span id="p-dist" class="p-stat-val">—</span></div>
    <div class="p-stat"><span class="p-stat-label">Diameter</span><span id="p-diam" class="p-stat-val">—</span></div>
    <div class="p-stat"><span class="p-stat-label">Orbital Period</span><span id="p-period" class="p-stat-val">—</span></div>
    <div class="p-stat"><span class="p-stat-label">Temperature</span><span id="p-temp" class="p-stat-val">—</span></div>
    <div class="p-stat"><span class="p-stat-label">Moons</span><span id="p-moons" class="p-stat-val">—</span></div>
    <div class="p-stat"><span class="p-stat-label">Gravity</span><span id="p-grav" class="p-stat-val">—</span></div>
  </div>
  <p id="p-desc" class="p-desc">—</p>
</div>

<!-- PLANET LABELS -->
<div id="labels"></div>

<!-- BOTTOM HINT -->
<div class="hint-bar">Click any planet to explore · Scroll to zoom · Drag to pan</div>

<script src="script.js"></script>
</body>
</html>
